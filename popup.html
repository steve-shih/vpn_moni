<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN 差異檢查器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>VPN 差異檢查器</h1>
      <p class="subtitle">讀取目前環境資訊並與基準值進行比對</p>
    </header>

    <div id="summary-section" class="summary-box">
      <span class="label">目前判定：</span>
      <span id="summary-text">載入中...</span>
    </div>

    <main id="details-section">
      <div class="section-title">網路層</div>
      <div class="field-item" id="field-publicIp">
        <span class="field-label">公網 IP</span>
        <div class="field-content">
          <span class="field-value" id="val-publicIp">-</span>
          <span class="field-status" id="status-publicIp">取得中</span>
        </div>
      </div>
      <div class="field-item" id="field-geo">
        <span class="field-label">地區 / ISP</span>
        <div class="field-content">
          <span class="field-value" id="val-geo">-</span>
          <span class="field-status" id="status-geo">-</span>
        </div>
      </div>

      <div class="section-title">瀏覽器層</div>
      <div class="field-item" id="field-timezone">
        <span class="field-label">時區</span>
        <div class="field-content">
          <span class="field-value" id="val-timezone">-</span>
          <span class="field-status" id="status-timezone">-</span>
        </div>
      </div>
      <div class="field-item" id="field-language">
        <span class="field-label">語言</span>
        <div class="field-content">
          <span class="field-value" id="val-language">-</span>
          <span class="field-status" id="status-language">-</span>
        </div>
      </div>
      <div class="field-item" id="field-platform">
        <span class="field-label">平台</span>
        <div class="field-content">
          <span class="field-value" id="val-platform">-</span>
          <span class="field-status" id="status-platform">-</span>
        </div>
      </div>

      <div class="section-title">硬體與圖形</div>
      <div class="field-item" id="field-webgl">
        <span class="field-label">WebGL Renderer</span>
        <div class="field-content">
          <span class="field-value" id="val-webgl">-</span>
          <span class="field-status" id="status-webgl">-</span>
        </div>
      </div>
      <div class="field-item" id="field-screen">
        <span class="field-label">螢幕解析度 / DPR</span>
        <div class="field-content">
          <span class="field-value" id="val-screen">-</span>
          <span class="field-status" id="status-screen">-</span>
        </div>
      </div>
    </main>

    <div class="section-title">環境偽裝設定 (Spoofing)</div>
    <div class="spoof-settings">
      <div class="form-row">
        <label class="switch-label">
          <span>開啟環境偽裝</span>
          <input type="checkbox" id="chk-spoof-enabled">
        </label>
      </div>

      <div class="form-grid">
        <div class="form-item">
          <label>語言</label>
          <select id="sel-lang">
            <option value="zh-TW">繁體中文 (台灣)</option>
            <option value="zh-CN">简体中文 (中国)</option>
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="ja-JP">日本語 (日本)</option>
            <option value="ko-KR">한국어 (韓國)</option>
            <option value="tr-TR">Türkçe (土耳其)</option>
            <option value="fr-FR">Français (法國)</option>
            <option value="de-DE">Deutsch (德國)</option>
            <option value="es-ES">Español (西班牙)</option>
            <option value="pt-BR">Português (巴西)</option>
            <option value="ru-RU">Русский (俄羅斯)</option>
            <option value="th-TH">ไทย (泰國)</option>
            <option value="vi-VN">Tiếng Việt (越南)</option>
          </select>
        </div>
        <div class="form-item">
          <label>平台 (OS)</label>
          <select id="sel-platform">
            <option value="Win32">Windows 10/11</option>
            <option value="MacIntel">macOS (Intel)</option>
            <option value="MacIntel">macOS (Apple Silicon)</option>
            <option value="Linux x86_64">Linux Desktop</option>
            <option value="iPhone">iPhone (iOS)</option>
            <option value="Linux armv8l">Android Phone</option>
          </select>
        </div>
        <div class="form-item">
          <label>WebGL 渲染器</label>
          <select id="sel-webgl">
            <option value="NVIDIA GeForce RTX 4090">NVIDIA RTX 4090</option>
            <option value="NVIDIA GeForce RTX 3080">NVIDIA RTX 3080</option>
            <option value="NVIDIA GeForce GTX 1650">NVIDIA GTX 1650</option>
            <option value="AMD Radeon RX 7900 XTX">AMD RX 7900 XTX</option>
            <option value="Apple M2">Apple M2 GPU</option>
            <option value="Apple M1">Apple M1 GPU</option>
            <option value="Intel(R) UHD Graphics 630">Intel UHD 630</option>
            <option value="Intel Iris OpenGL Engine">Intel Iris Xe</option>
            <option value="Adreno (TM) 640">Adreno 640 (Mobile)</option>
          </select>
        </div>
        <div class="form-item">
          <label>解析度</label>
          <select id="sel-resolution">
            <option value="1920,1080,1">1920x1080 (1x)</option>
            <option value="1512,982,2">1512x982 (2x)</option>
            <option value="1440,900,1">1440x900 (1x)</option>
            <option value="2560,1440,1">2560x1440 (1x)</option>
          </select>
        </div>
      </div>
      
      <div class="form-row mt-10">
        <button id="btn-sync-ip" class="btn secondary mini-btn">同步至 IP 所在時區</button>
      </div>
    </div>

    <div class="section-title">代理伺服器設定 (Proxy / IP 修改)</div>
    <div class="spoof-settings">
      <div class="form-row">
        <label class="switch-label">
          <span>開啟 Proxy 代理</span>
          <input type="checkbox" id="chk-proxy-enabled">
        </label>
      </div>
      <div class="form-grid">
        <div class="form-item" style="grid-column: span 2;">
          <label>代理主機 (IP 或 Domain)</label>
          <input type="text" id="txt-proxy-host" placeholder="例如: 1.2.3.4">
        </div>
        <div class="form-item">
          <label>通訊協定</label>
          <select id="sel-proxy-scheme">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
            <option value="socks5">SOCKS5</option>
          </select>
        </div>
        <div class="form-item">
          <label>連接埠 (Port)</label>
          <input type="number" id="num-proxy-port" placeholder="8080">
        </div>
      </div>
      <div class="form-row mt-10">
        <button id="btn-save-proxy" class="btn primary mini-btn">儲存並套用 Proxy</button>
      </div>
    </div>

    <footer>
      <div class="timestamp">
        檢查時間：<span id="check-time">-</span>
      </div>
      <div class="actions">
        <button id="btn-refresh" class="btn secondary">重新檢查</button>
        <button id="btn-set-baseline" class="btn primary">設為目前基準</button>
      </div>
    </footer>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
